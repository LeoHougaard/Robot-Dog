[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17
build_flags =
  -D ROBOT_DOG_VERSION=\"0.1.0\"
  -D SERVO_UART_NUM=1
  -D SERVO_TX_PIN=19
  -D SERVO_RX_PIN=18
  -D SERVO_BAUD=1000000
  -D WIFI_SETUP_TIMEOUT_SECONDS=45
  -D IMU_SDA_PIN=32
  -D IMU_SCL_PIN=33
  -D MOTOR_A_PWM_PIN=25
  -D MOTOR_A_IN1_PIN=21
  -D MOTOR_A_IN2_PIN=17
  -D MOTOR_B_PWM_PIN=26
  -D MOTOR_B_IN1_PIN=22
  -D MOTOR_B_IN2_PIN=23

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 10.1.39.32
